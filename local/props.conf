[source::XmlWinEventLog:Security]
EVAL-NewProcessIdDecimal = case(EventCode==4688, tonumber(NewProcessId,16))
EVAL-ProcessIdDecimal =  tonumber(ProcessId,16)
EVAL-TargetProcessIdDecimal = case(EventCode==4696,tonumber(TargetProcessId,16))


